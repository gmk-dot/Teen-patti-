<!DOCTYPE html>
<html>
<head>
<title>Card Game</title>
<style>
body{
    font-family:Arial;
    text-align:center;
    background:#0b6623;
    color:white;
}

.card{
    display:inline-block;
    background:white;
    color:black;
    padding:15px;
    margin:5px;
    border-radius:8px;
    font-size:20px;
}

.back{
    background:#222;
    color:white;
}

.player{
    margin:20px;
}
</style>
</head>

<body>

<h1>Card Game</h1>

<button onclick="startGame()">Start Game</button>

<h2>You</h2>
<div id="you"></div>

<h2>Bot 1</h2>
<div id="bot1"></div>

<h2>Bot 2</h2>
<div id="bot2"></div>

<h2>Bot 3</h2>
<div id="bot3"></div>


<script src="script.js"></script>

</body>
</html>

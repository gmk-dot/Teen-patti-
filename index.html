<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>52 Card Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="table">

    <!-- Player 2 -->
    <div class="player top" id="p2">
        <h3>Bot 1</h3>

        <div class="unseen"></div>
        <div class="seen"></div>
        <div class="hand"></div>

    </div>

    <!-- Middle -->

    <div class="center">

        <div id="deck">🂠</div>

        <div id="playedCards"></div>

        <button id="startGame">Start Game</button>

    </div>

    <!-- Left -->

    <div class="player left" id="p1">

        <h3>You</h3>

        <div class="unseen"></div>
        <div class="seen"></div>
        <div class="hand"></div>

    </div>

    <!-- Right -->

    <div class="player right" id="p3">

        <h3>Bot 2</h3>

        <div class="unseen"></div>
        <div class="seen"></div>
        <div class="hand"></div>

    </div>

    <!-- Bottom -->

    <div class="player bottom" id="p4">

        <h3>Bot 3</h3>

        <div class="unseen"></div>
        <div class="seen"></div>
        <div class="hand"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
  </html>
